# go2rtc configuration for grandma-watcher
# Raspberry Pi 5 + Arducam IMX708 NoIR (CSI) + USB audio
#
# IMPORTANT: Pi 5 standard rpicam-apps packages do not include the libav H.264
# codec. Using --codec mjpeg instead, which is universally supported and works
# well for the go2rtc frame.jpeg API endpoint.
#
# Camera is the SOLE owner of the CSI device. monitor.py pulls snapshots via
# the HTTP API (GET /api/frame.jpeg?src=grandma) -- it never opens the camera
# directly.

streams:
  grandma:
    - exec:rpicam-vid -t 0 --width 960 --height 540 --framerate 15 --inline --nopreview --codec mjpeg -q 80 -o -
    # Audio input: USB mic via UGREEN adapter (ALSA device)
    # Run `arecord -l` on the Pi to confirm the card name/number.
    # Typical: plughw:CARD=Device,DEV=0  or  plughw:1,0
    # - exec:ffmpeg -hide_banner -nostats -f alsa -channels 1 -sample_rate 16000 -i plughw:1,0 -c:a libopus -ar 48000 -ac 1 -b:a 32k -f rtsp {output}
    # Backchannel: browser mic -> Pi speaker (Logitech S150 USB)
    # Run `aplay -l` on the Pi to confirm the card name/number.
    # Typical: plughw:CARD=S150,DEV=0  or  plughw:2,0
    # - exec:ffmpeg -hide_banner -nostats -fflags nobuffer+flush_packets -flags low_delay -f alaw -ar 8000 -ac 1 -i pipe:0 -f alsa plughw:2,0#backchannel=1#audio=alaw/8000

# ---------- API / ports ----------

api:
  listen: ":1984"    # HTTP API + WebUI

rtsp:
  listen: ":8554"    # RTSP server (used internally by ffmpeg audio sources)

webrtc:
  listen: ":8555/tcp"  # WebRTC signaling + media
  # ICE candidates -- use local network only (no STUN/TURN needed since
  # Cloudflare Tunnel handles external access)
  candidates:
    - stun:8555

# ---------- Logging ----------

log:
  level: info   # debug | info | warn | error
