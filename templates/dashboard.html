<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigil</title>
  <link rel="stylesheet" href="/static/dashboard.css?v=2">
</head>
<body>

  <header>
    <h1>Vigil</h1>
    <div id="header-controls">
      <span id="silence-badge"></span>
      <button id="theme-toggle" type="button" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div id="stream-paused-banner" hidden>Stream paused</div>
  <div id="call-active-banner" hidden>📞 Call in progress</div>
  <img id="stream-img" src="/stream" alt="Live camera feed">

  <section id="controls">
    <button id="silence-btn" type="button">🔕 Silence 30 min</button>
    <button id="pause-stream-btn" type="button">Pause Stream</button>
    {% if talk_url %}
      <button id="talk-btn" type="button" data-talk-url="{{ talk_url }}" data-stream-name="{{ stream_name }}">🎙 Talk</button>
    {% else %}
      <button id="talk-btn" class="btn btn--disabled" type="button" disabled
              title="Requires Tailscale — set talk_url in config.yaml">
        🎙 Talk
      </button>
    {% endif %}
  </section>

  <section id="gallery-section">
    <h2>Recent Activity</h2>
    <div id="gallery"></div>
  </section>

  <div id="modal" hidden>
    <div id="modal-sheet">
      <button id="modal-close" type="button">✕</button>
      <img id="modal-img" src="" alt="Frame from monitoring">
      <p id="modal-archived-notice" hidden>🔒 This image has been archived and encrypted.</p>
      <p id="modal-reason"></p>
      <div id="modal-actions">
        <button id="modal-real" type="button">✓ Real Issue</button>
        <button id="modal-false" type="button">✗ False Alarm</button>
      </div>
    </div>
  </div>

  <section id="report-section">
    <button id="report-btn" type="button">⚠ Report Missed Alert</button>
  </section>

  <div id="talk-modal" hidden>
    <div id="talk-modal-sheet">
      <p id="talk-status">Calling…</p>
      <p id="talk-warning" hidden></p>
      <img id="talk-stream-img" src="/stream" alt="Live camera feed during call">
      <div id="talk-actions">
        <button id="talk-mute-btn" type="button">Mute Mic</button>
        <button id="talk-end-btn" type="button">End Call</button>
      </div>
    </div>
  </div>

  <script src="/static/dashboard.js?v=5"></script>
</body>
</html>
